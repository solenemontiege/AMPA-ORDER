<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMPA La Penya Blanca — Pedido / Order</title>
  <meta name="description" content="Pre-order AMPA La Penya Blanca merchandising. Support our school!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FDF8F0 0%, #E8F5F0 50%, #FDF8F0 100%);
      min-height: 100vh;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: linear-gradient(135deg, #1B6B4A 0%, #2AA5A0 100%);
      padding: 32px 20px 40px;
      text-align: center;
      border-radius: 0 0 40px 40px;
      box-shadow: 0 8px 32px rgba(27,107,74,0.2);
      animation: slideDown 0.6s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .header-emoji { font-size: 48px; margin-bottom: 8px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px; color: white; margin: 0 0 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header .sub { color: rgba(255,255,255,0.8); font-size: 14px; margin: 0 0 4px; }
    .header .divider { height: 2px; width: 60px; background: #E8634A; margin: 16px auto; border-radius: 1px; }
    .header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: #FFD700; margin: 0 0 4px;
    }
    .header .sub2 { color: rgba(255,255,255,0.73); font-size: 14px; }

    .container { max-width: 560px; margin: 0 auto; padding: 0 16px; }

    .desc-box {
      background: white; border-radius: 20px; padding: 24px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-left: 4px solid #E8634A;
      margin-top: -20px;
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .desc-box p { font-size: 14px; color: #333; line-height: 1.6; margin: 0 0 8px; }
    .desc-box .en { font-size: 13px; color: #777; margin: 0; }

    .card {
      background: white; border-radius: 20px; padding: 28px 28px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); margin-top: 20px;
    }
    .card-1 { animation: fadeUp 0.6s ease 0.3s both; }
    .card-2 { animation: fadeUp 0.6s ease 0.4s both; }
    .card-3 { animation: fadeUp 0.6s ease 0.5s both; }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: #1B6B4A; margin: 0 0 4px;
    }
    .card .card-sub { color: #999; font-size: 12px; margin: 0 0 20px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 700; color: #777; margin-bottom: 4px; display: block; }
    .form-group input {
      width: 100%; padding: 10px 14px; border-radius: 10px; font-size: 14px;
      border: 2px solid #E8E8E8; outline: none; font-family: 'Nunito', sans-serif;
      transition: border 0.2s; background: #FAFAFA;
    }
    .form-group input:focus { border-color: #2AA5A0; }

    .product-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid #f0f0f0;
    }
    .product-info { display: flex; align-items: center; gap: 8px; flex: 1; }
    .product-emoji { font-size: 22px; }
    .product-name { font-weight: 700; font-size: 14px; color: #333; margin: 0; }
    .product-name-en { font-size: 12px; color: #999; margin: 0; }
    .price-badge {
      background: #E8634A; color: white; border-radius: 10px;
      padding: 4px 12px; font-size: 14px; font-weight: 800;
      min-width: 48px; text-align: center; margin-right: 16px;
    }
    .qty-control { display: flex; align-items: center; }
    .qty-btn {
      width: 34px; height: 34px; border: 2px solid #E8E8E8;
      background: #F5F5F5; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-family: 'Nunito', sans-serif; transition: background 0.2s;
    }
    .qty-btn:hover { background: #eee; }
    .qty-btn.left { border-radius: 10px 0 0 10px; border-right: none; }
    .qty-btn.right { border-radius: 0 10px 10px 0; border-left: none; }
    .qty-display {
      width: 40px; height: 34px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #E8E8E8; border-left: none; border-right: none;
      font-size: 16px; font-weight: 800; background: white;
    }
    .qty-display.active { color: #1B6B4A; background: #F0F8F5; }
    .qty-display.inactive { color: #ccc; }

    .total-row {
      border-top: 2px solid #1B6B4A; margin: 8px 0 0; padding: 16px 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .total-label { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 800; color: #1B6B4A; }
    .total-value { font-size: 28px; font-weight: 900; color: #E8634A; font-family: 'Playfair Display', serif; }

    .pay-buttons { display: flex; gap: 12px; }
    .pay-btn {
      flex: 1; padding: 14px 12px; border-radius: 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
      font-family: 'Nunito', sans-serif; background: #F5F5F5; color: #555;
    }
    .pay-btn.selected { background: #1B6B4A; color: white; border-color: #1B6B4A; }

    .bank-info {
      background: #FFF8F5; border-radius: 12px; padding: 14px 18px;
      margin-top: 14px; border: 1px solid rgba(232,99,74,0.2);
    }
    .bank-info .label { font-size: 12px; color: #E8634A; font-weight: 700; margin: 0 0 2px; }
    .bank-info .name { font-size: 13px; color: #333; font-weight: 600; margin: 0; }
    .bank-info .iban { font-size: 15px; color: #1B6B4A; font-weight: 800; letter-spacing: 0.8px; margin: 0; }

    .error-box {
      background: #FFF0F0; border: 1px solid #ffcccc; border-radius: 14px;
      padding: 12px 18px; margin-bottom: 16px; color: #cc3333; font-size: 14px;
      font-weight: 600; text-align: center;
    }

    .submit-btn {
      width: 100%; padding: 18px 24px; border-radius: 18px; border: none;
      background: linear-gradient(135deg, #E8634A 0%, #D4503A 100%);
      color: white; font-size: 18px; font-weight: 800; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 6px 24px rgba(232,99,74,0.35);
      transition: all 0.3s; letter-spacing: 0.5px;
      margin-top: 24px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,99,74,0.45); }
    .submit-btn:disabled { background: #ccc; box-shadow: none; cursor: default; transform: none; }

    .footer { text-align: center; margin-top: 24px; }
    .footer .msg { font-size: 14px; font-weight: 700; color: #1B6B4A; }
    .footer .msg-en { font-size: 12px; color: #999; }
    .footer .contact { font-size: 11px; color: #bbb; margin-top: 12px; }
    .footer .deadline { font-size: 11px; color: #ccc; }

    /* Success page */
    .success-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .success-box {
      background: white; border-radius: 24px; padding: 48px 40px; max-width: 520px;
      width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      animation: fadeUp 0.6s ease;
    }
    .success-box .emoji { font-size: 64px; margin-bottom: 16px; }
    .success-box h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #1B6B4A; margin: 0 0 12px; }
    .success-box h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: #E8634A; margin: 0 0 20px; font-weight: 700; }
    .summary { background: #F0F8F5; border-radius: 16px; padding: 20px 24px; margin-bottom: 24px; text-align: left; }
    .summary-title { margin: 0 0 8px; font-weight: 700; color: #1B6B4A; font-size: 15px; }
    .summary-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #444; }
    .summary-total {
      border-top: 2px solid #1B6B4A; margin-top: 12px; padding-top: 12px;
      display: flex; justify-content: space-between;
      font-size: 18px; font-weight: 800; color: #1B6B4A;
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 24px; }
      .header h2 { font-size: 18px; }
      .pay-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSehfDtvxgAn8SaSQ-CPoq-HP3ZQdEH7c3-gR4fmqEJwS0cy7A/formResponse";
const ENTRY_IDS = {
  nombre: "entry.1440853744", apellidos: "entry.1632002771",
  telefono: "entry.1088013225", email: "entry.369039356",
  bolsa: "entry.300393528", notas: "entry.1278531670",
  vaso: "entry.1741784002", botella: "entry.1133923652",
  usb: "entry.1571648158", llavero: "entry.1287971374",
  pago: "entry.1544833098",
};
const PRODUCTS = [
  { key: "bolsa", es: "Bolsa de Tela", en: "Cotton Tote Bag", price: 5, emoji: "👜" },
  { key: "notas", es: "Set Notas Adhesivas", en: "Recycled Sticky Notes", price: 3, emoji: "📝" },
  { key: "vaso", es: "Vaso Térmico 500ml", en: "Thermal Mug 500ml", price: 12, emoji: "☕" },
  { key: "botella", es: "Botella Térmica 500ml", en: "Thermal Bottle 500ml", price: 12, emoji: "🧴" },
  { key: "usb", es: "USB 2GB", en: "USB Flash Drive 2GB", price: 5, emoji: "💾" },
  { key: "llavero", es: "Llavero Abridor", en: "Keyring Bottle Opener", price: 3, emoji: "🔑" },
];

const state = {
  nombre: "", apellidos: "", telefono: "", email: "",
  bolsa: 0, notas: 0, vaso: 0, botella: 0, usb: 0, llavero: 0,
  pago: "", submitted: false, submitting: false, error: "",
};

function getTotal() {
  return PRODUCTS.reduce((s, p) => s + p.price * (state[p.key] || 0), 0);
}
function getItemCount() {
  return PRODUCTS.reduce((s, p) => s + (state[p.key] || 0), 0);
}

function submitForm() {
  if (!state.nombre || !state.apellidos || !state.telefono || !state.email) {
    state.error = "Por favor, rellena todos los campos obligatorios / Please fill in all required fields";
    render(); return;
  }
  if (!/\S+@\S+\.\S+/.test(state.email)) {
    state.error = "Por favor, introduce un email válido / Please enter a valid email";
    render(); return;
  }
  if (getItemCount() === 0) {
    state.error = "Selecciona al menos un producto / Select at least one product";
    render(); return;
  }
  if (!state.pago) {
    state.error = "Selecciona un método de pago / Select a payment method";
    render(); return;
  }
  state.error = "";
  state.submitting = true;
  render();

  const params = new URLSearchParams();
  Object.keys(ENTRY_IDS).forEach(k => params.append(ENTRY_IDS[k], String(state[k])));
  params.append("emailAddress", state.email);

  fetch(GOOGLE_FORM_URL + "?" + params.toString(), {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
  }).then(() => { state.submitted = true; state.submitting = false; render(); })
    .catch(() => { state.submitted = true; state.submitting = false; render(); });
}

function render() {
  const app = document.getElementById("app");
  if (state.submitted) {
    app.innerHTML = renderSuccess();
    return;
  }
  app.innerHTML = renderForm();
  bindEvents();
}

function renderSuccess() {
  const items = PRODUCTS.filter(p => state[p.key] > 0)
    .map(p => `<div class="summary-item"><span>${p.emoji} ${p.es} × ${state[p.key]}</span><span style="font-weight:700">${p.price * state[p.key]} €</span></div>`).join("");

  const bankInfo = state.pago.includes("Transferencia") ? `
    <div class="bank-info" style="margin-bottom:20px">
      <p class="label">Datos bancarios / Bank details:</p>
      <p class="name">APA C.P. La Penya Blanca</p>
      <p class="iban">ES55 3159 0080 6829 8345 8320</p>
    </div>` : "";

  return `<div class="success-wrap"><div class="success-box">
    <div class="emoji">🎉</div>
    <h2>¡Pedido Enviado!</h2>
    <h3>Order Submitted!</h3>
    <p style="color:#555;font-size:15px;line-height:1.6;margin:0 0 8px">Recibirás una confirmación por email en <strong>${state.email}</strong></p>
    <p style="color:#888;font-size:13px;line-height:1.6;margin:0 0 24px">You will receive a confirmation email at the address above.</p>
    <div class="summary">
      <p class="summary-title">Resumen / Summary</p>
      ${items}
      <div class="summary-total"><span>TOTAL</span><span>${getTotal()} €</span></div>
    </div>
    ${bankInfo}
    <p style="color:#1B6B4A;font-size:14px;font-weight:700">¡Gracias por apoyar a nuestros niños! 💚</p>
    <p style="color:#888;font-size:12px">Thank you for supporting our children!</p>
  </div></div>`;
}

function renderProductRow(p) {
  const qty = state[p.key] || 0;
  return `<div class="product-row">
    <div class="product-info">
      <span class="product-emoji">${p.emoji}</span>
      <div><p class="product-name">${p.es}</p><p class="product-name-en">${p.en}</p></div>
    </div>
    <div class="price-badge">${p.price} €</div>
    <div class="qty-control">
      <button class="qty-btn left" data-key="${p.key}" data-action="minus">−</button>
      <div class="qty-display ${qty > 0 ? 'active' : 'inactive'}">${qty}</div>
      <button class="qty-btn right" data-key="${p.key}" data-action="plus">+</button>
    </div>
  </div>`;
}

function renderForm() {
  const total = getTotal();
  const payOptions = [
    { value: "Efectivo / Cash", label: "💶 Efectivo / Cash" },
    { value: "Transferencia bancaria / Bank transfer", label: "🏦 Transferencia / Bank Transfer" },
  ];

  return `
  <div class="header">
    <div class="header-emoji"><img src="ampa_logo.png" alt="AMPA Logo" style="width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.2));" /></div>
    <h1>AMPA La Penya Blanca</h1>
    <p class="sub">Benigembla</p>
    <div class="divider"></div>
    <h2>¡Apoya a nuestra escuela!</h2>
    <p class="sub2">Support our school!</p>
  </div>

  <div class="container">
    <div class="desc-box">
      <p>Somos el AMPA del colegio La Penya Blanca de Benigembla. Recaudamos fondos para excursiones, material educativo y eventos como las fiestas de Navidad y fin de curso.</p>
      <p class="en">We are the Parents' Association of La Penya Blanca school. We raise funds for school trips, materials, and events like Christmas and end-of-year festivals.</p>
    </div>

    <div class="card card-1">
      <h3>Datos Personales</h3>
      <p class="card-sub">Personal Details</p>
      <div class="form-grid">
        <div class="form-group"><label>Nombre / Name *</label><input type="text" id="f-nombre" value="${state.nombre}" /></div>
        <div class="form-group"><label>Apellidos / Surname *</label><input type="text" id="f-apellidos" value="${state.apellidos}" /></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Teléfono / Phone *</label><input type="tel" id="f-telefono" value="${state.telefono}" /></div>
        <div class="form-group"><label>Email *</label><input type="email" id="f-email" value="${state.email}" /></div>
      </div>
    </div>

    <div class="card card-2">
      <h3>Productos / Products</h3>
      <p class="card-sub">Selecciona la cantidad / Select quantity</p>
      ${PRODUCTS.map(renderProductRow).join("")}
      <div class="total-row">
        <span class="total-label">TOTAL</span>
        <span class="total-value">${total} €</span>
      </div>
    </div>

    <div class="card card-3">
      <h3>Método de Pago</h3>
      <p class="card-sub">Payment Method</p>
      <div class="pay-buttons">
        ${payOptions.map(o => `<button class="pay-btn ${state.pago === o.value ? 'selected' : ''}" data-pago="${o.value}">${o.label}</button>`).join("")}
      </div>
      ${state.pago.includes("Transferencia") ? `
        <div class="bank-info">
          <p class="label">Cuenta bancaria / Bank account:</p>
          <p class="name">APA C.P. La Penya Blanca</p>
          <p class="iban">ES55 3159 0080 6829 8345 8320</p>
        </div>` : ""}
    </div>

    ${state.error ? `<div class="error-box">⚠️ ${state.error}</div>` : ""}

    <button class="submit-btn" id="submit-btn" ${state.submitting ? 'disabled' : ''}>
      ${state.submitting ? "Enviando... / Submitting..." : "📩 Enviar Pedido / Submit Order"}
    </button>

    <div class="footer">
      <p class="msg">¡Todos los beneficios van directamente a nuestros niños! 💚</p>
      <p class="msg-en">All profits go directly to our children!</p>
      <p class="contact">Contacto / Contact: Solene — 690 994 217 · benigemblaampa@gmail.com</p>
      <p class="deadline">Fecha límite / Deadline: 5 de junio 2026 / June 5, 2026</p>
    </div>
  </div>`;
}

function bindEvents() {
  // Input fields
  ["nombre","apellidos","telefono","email"].forEach(k => {
    const el = document.getElementById("f-" + k);
    if (el) el.addEventListener("input", e => { state[k] = e.target.value; });
  });
  // Qty buttons
  document.querySelectorAll(".qty-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.key;
      const action = btn.dataset.action;
      if (action === "plus") state[key]++;
      else state[key] = Math.max(0, state[key] - 1);
      render();
    });
  });
  // Payment buttons
  document.querySelectorAll(".pay-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.pago = btn.dataset.pago;
      render();
    });
  });
  // Submit
  const sub = document.getElementById("submit-btn");
  if (sub) sub.addEventListener("click", submitForm);
}

// Initial render
render();
</script>
</body>
</html>
